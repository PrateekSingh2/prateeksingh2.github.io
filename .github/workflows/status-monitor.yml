name: Status Monitor Agent

on:
  push:
    branches:
      - main
  schedule:
    # Staggered cron schedule (runs at min 2, 7, 12, etc.)
    # This specifically bypasses GitHub's massive global queue at the exact 5/10/15 min marks,
    # making the trigger infinitely more robust and less likely to be dropped or delayed!
    - cron: '2/5 * * * *'
  workflow_dispatch:

jobs:
  ping-services:
    runs-on: ubuntu-latest
    environment: Status
    permissions:
      contents: write
    env:
      STATUS_DATA_TARGET: 'gist'
      GIST_ID: ${{ secrets.GIST_ID }}
      GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
      GIST_FILENAME: ${{ secrets.GIST_FILENAME }}
      REFRESH_INTERVAL_MS: '300000'
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Run Ping Script
        run: node scripts/status-ping.js
